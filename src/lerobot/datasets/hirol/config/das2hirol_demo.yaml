# Example config for DAS MCAP -> HIROL JSON+images conversion

input:
  mcap_file: ""               # If empty, use task_dir + vio_result.json
  task_dir: "/home/hanyu/Data_Collection/data/output/vio_traj_1222_10eps"                # Directory containing vio_result.json

output:
  # Use a repo-relative, writable path under this project
  task_dir: "dataset/data/das"  # Will be resolved relative to repo root

topics:
  ref: "/robot0/sensor/camera0/compressed"
  cameras:
    - topic: "/robot0/sensor/camera0/compressed"
      key: "mid"
    - topic: "/robot0/sensor/camera1/compressed"
      key: "left"
    - topic: "/robot0/sensor/camera2/compressed"
      key: "right"
  eef_pose: "/robot0/vio/eef_pose"
  gripper: "/robot0/sensor/magnetic_encoder"
  imu: "/robot0/sensor/imu"
  # tactile topics are optional; only required if listed in 'require' below
  # tactile_left: "/robot0/sensor/tactile_left"
  # tactile_right: "/robot0/sensor/tactile_right"

fps: 15
img_new_width: -1            # >0 to resize proportionally by width
preprocess:
  target_size: [640, 480]
  aspect_ratio: [4, 3]

# Conditionally require optional topics. If true and corresponding topic is configured, the episode is dropped when missing.
require:
  include_gripper: false
  include_imu: false
  include_tactile: false

text:
  desc: "pick and place"
  steps: ""
  goal: ""
